type Subscription {
  nuevaNotificacion(usuarioId: ID!): Notificacion!

  """
  Recibe actualizaciones en tiempo real de todos los turnos del hospital indicado. Usar en pantallas de sala de espera y recepción.
  """
  turnoActualizado(hospitalId: Int!): TurnoEvento!

  """
  Canal personal del paciente. Recibe actualizaciones de su turno en tiempo real.
  """
  miTurnoActualizado(pacienteId: ID!): TurnoEvento!
  citaActualizada(medicoId: ID!): CitaEvento!
  citaPacienteActualizada(pacienteId: ID!): CitaEvento!
}