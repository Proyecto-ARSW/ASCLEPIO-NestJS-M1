# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - asclepio-core

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies and build
        run: |
          # --frozen-lockfile: falla si pnpm-lock.yaml está desactualizado, garantiza builds reproducibles
          pnpm install --frozen-lockfile
          # pnpm run build ya ejecuta "npx prisma generate && nest build"
          # prisma generate crea el cliente en node_modules/.prisma/client antes de compilar
          pnpm run build
          # prune --prod: elimina devDependencies (nest CLI, prisma CLI, TypeScript, Jest, etc.)
          # El cliente de Prisma generado en node_modules/.prisma/client NO es un paquete
          # manejado por pnpm, así que sobrevive el prune. @prisma/client sí está en dependencies.
          pnpm prune --prod

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_164976A10F484C97821E7EACA1FC5BF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C6102AF9E204901A59C4701E573CADA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_318A3297766F45ADBFC4B45EE00D308D }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'asclepio-core'
          slot-name: 'Production'
          package: .
          # startup-command le dice a Azure exactamente cómo arrancar el proceso.
          # Sin esto, Azure intentaría "npm start" → "npx prisma generate && nest start",
          # pero nest CLI fue removido por pnpm prune --prod y fallaría.
          # "node dist/src/main" es seguro porque prisma generate ya corrió durante el build.
          startup-command: 'node dist/src/main'
          