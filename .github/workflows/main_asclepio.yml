# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy NestJS app to Azure Web App - Asclepio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # pnpm debe instalarse ANTES de setup-node para que el cache funcione
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          # setup-node detecta pnpm y cachea ~/.pnpm-store automáticamente
          cache: 'pnpm'

      # --frozen-lockfile: falla si pnpm-lock.yaml está desactualizado respecto a package.json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Genera el cliente Prisma en generated/prisma/ ANTES de compilar NestJS.
      # Step separado para visibilidad: si falla la generación, el error es inmediato
      # y no queda enterrado dentro del log del step de build.
      # Usa el binario local de prisma (devDep) que pnpm resolvió en el paso anterior.
      - name: Generate Prisma client
        run: pnpm exec prisma generate

      # nest build compila TypeScript a dist/. El prisma generate ya se ejecutó arriba,
      # así que la llamada interna del script build es redundante pero inocua (es idempotente).
      - name: Build
        run: pnpm exec nest build

      # Elimina devDependencies DESPUÉS del build: el compilado ya no las necesita
      # Resultado: node_modules solo contiene deps de producción (~70% menos peso)
      - name: Prune dev dependencies
        run: pnpm prune --prod

      # Solo subir lo estrictamente necesario para ejecutar la app en Azure:
      # - dist/      → código NestJS compilado (JS)
      # - node_modules/ → deps de producción ya podadas
      # - generated/ → cliente Prisma generado (binarios del query engine)
      # - package.json → Azure lo lee para determinar el startup command (npm start)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            node_modules/
            generated/
            package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2947447F1834F94937E2D5076E66FAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B393563A4A4245C3AE405C1007E56FE0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_285071134DEE43B993DD6E6995083C51 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Asclepio'
          slot-name: 'Production'
          package: .

