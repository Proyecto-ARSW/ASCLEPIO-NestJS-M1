global:
  scrape_interval: 5s      
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'nestjs-app'
    scrape_interval: 5s
    static_configs:
      # host.docker.internal apunta a tu máquina host desde Docker
      # Cambia el puerto 3000 al puerto de tu NestJS si es diferente
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
